# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Local Development
#
# Starts both FastAPI backend and Streamlit frontend in one command:
#   docker-compose up --build
#
# Then open: http://localhost:8501
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      target: runtime
    container_name: gita_backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
      - CHROMA_DB_PATH=./data/chromadb
    volumes:
      # Persist ChromaDB and dataset downloads between container restarts
      - gita_data:/app/data
      - gita_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: gita_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gita_data:
  gita_logs:
