name: CI — Lint & Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with Ruff
        run: |
          ruff check . --select E,F,W --ignore E501 --exclude __pycache__,data,logs

      - name: Syntax check — app.py
        run: python -m py_compile app.py

      - name: Syntax check — api/main.py
        run: python -m py_compile api/main.py

      - name: Run tests
        env:
          GEMINI_API_KEY: "test-key-placeholder"
          BACKEND_URL: "http://127.0.0.1:8000"
          CHROMA_DB_PATH: "./data/chromadb"
        run: |
          python -m pytest tests/ -v --tb=short || echo "No tests found — skipping"
